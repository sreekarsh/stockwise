name: StockWise CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      working-directory: stockwise-fullstack/stockwise
      run: npm ci
      
    - name: Syntax check
      working-directory: stockwise-fullstack/stockwise
      run: npx tsc --noEmit
      
    - name: Run health check
      working-directory: stockwise-fullstack/stockwise
      run: |
        timeout 10 npx tsx server.ts &
        sleep 5
        curl -s http://localhost:3000/api/health || exit 1