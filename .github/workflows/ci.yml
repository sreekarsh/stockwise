name: StockWise CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Syntax check
      run: node -c server.js && node -c js/main.js
      
    - name: Run health check
      run: |
        timeout 10 node server.js &
        sleep 5
        curl -s http://localhost:3000/api/health || exit 1