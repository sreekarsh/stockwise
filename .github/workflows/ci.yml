name: StockWise CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: stockwise-fullstack/stockwise/package-lock.json
        
    - name: Install dependencies
      working-directory: stockwise-fullstack/stockwise
      run: npm ci
      
    - name: Build check
      working-directory: stockwise-fullstack/stockwise
      run: npx tsc --noEmit --project tsconfig.json